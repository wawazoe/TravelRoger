services:

  frontend:
    build: ./frontend
    ports:
      - 8080:80

  backend:
    build: ./backend
    ports:
      - 3000:8080
    environment:
      DB_HOST: db
      DB_USER: travelloger
      DB_PASSWORD: travelloger
      DB_NAME: travelloger
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER:     travelloger
      POSTGRES_PASSWORD: travelloger
      POSTGRES_DB:       travelloger
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      
volumes:
  db_data: